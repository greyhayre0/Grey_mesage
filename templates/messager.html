<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Чаты</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <script>
        // Данные пользователя
        const currentUser = {
            id: {{ user_id|tojson }},
            username: {{ username|tojson }},
            nickname: {{ nickname|tojson }}
        };
    </script>
</head>
<body>
    <header>
        <nav>
            <a href="/messager" style="background-color: #096565;">Сообщения</a>
            <a href="/nas">Хранилище</a>
            <a href="#" onclick="logout()">выйти</a>
        </nav>
    </header>

    <main>
        <div class="chat">
            <div class="contact">
                <div class="contact-button">
                    <button id="openModal">+</button>
                </div>
                <div class="contact-list" id="contactList">
                    <!-- Сюда загружаются чаты -->
                </div>
            </div>
            
            <div class="message">
                <div class="messages-list" id="messagesList">
                    <!-- Сюда загружаются сообщения -->
                </div>
                <div class="message-input" id="messageInputArea">
                    <textarea rows="1" type="text" id="messageText" placeholder="Введи сообщение" onkeypress="handleKeyPress(event)"></textarea>
                    <button onclick="sendMessage()">✉︎</button>
                    <button onclick="attachFile()">⛓︎</button>
                </div>
            </div>
        </div>
    </main>

    <!--Всплывающее окно нового контакта-->
    <dialog id="myModal">
        <h3>Добавить контакт</h3>
        <input type="text" id="searchNickname" placeholder="Введите никнейм">
        <div id="searchResults" style="margin: 10px 0; max-height: 150px; overflow-y: auto;"></div>
        <button id="saveModal">Сохранить</button>
        <button id="closeModal">Закрыть</button>
    </dialog>

    <!-- Подключаем скрипты -->
    <script src="/static/js/messenger.js"></script>
    <script src="/static/js/modal.js"></script>
</body>
</html>
